<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تم التصويت - نظام التصويت</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    .confetti-wrap {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
    }
    .confetti-piece {
      position: absolute; width: 10px; height: 10px; border-radius: 2px;
      animation: fall linear forwards;
    }
    @keyframes fall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body style="background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%); min-height:100vh; display:flex; align-items:center; justify-content:center;">

<div class="confetti-wrap" id="confetti"></div>

<div style="max-width:500px; width:90%; text-align:center; position:relative; z-index:1;">
  <div class="success-icon">✅</div>

  <h1 style="font-size:2rem; font-weight:900; color:var(--primary); margin-bottom:0.75rem;">
    تم التصويت بنجاح! 🎉
  </h1>
  <p style="font-size:1.1rem; color:var(--text-muted); margin-bottom:2rem; line-height:1.8;">
    شكراً لمشاركتك في الانتخابات.<br>
    صوتك تم تسجيله بشكل آمن ومشفر.
  </p>

  <div class="card" style="margin-bottom:1.5rem;">
    <div style="display:flex; align-items:center; gap:1rem; text-align:right;">
      <div style="font-size:2rem;">🔒</div>
      <div>
        <div style="font-weight:700; margin-bottom:0.25rem;">صوتك محمي</div>
        <div style="font-size:0.85rem; color:var(--text-muted);">تم تشفير صوتك ولا يمكن لأحد معرفة اختيارك</div>
      </div>
    </div>
    <div style="height:1px; background:var(--border); margin:1rem 0;"></div>
    <div style="display:flex; align-items:center; gap:1rem; text-align:right;">
      <div style="font-size:2rem;">✅</div>
      <div>
        <div style="font-weight:700; margin-bottom:0.25rem;">لا يمكن التصويت مرة أخرى</div>
        <div style="font-size:0.85rem; color:var(--text-muted);">تم تسجيل مشاركتك ولن تتمكن من التصويت مجدداً</div>
      </div>
    </div>
  </div>

  <div style="display:flex; gap:1rem; justify-content:center; flex-wrap:wrap;">
    <a href="/results" class="btn btn-primary">📊 عرض النتائج</a>
    <a href="/home" class="btn btn-outline">🏠 الصفحة الرئيسية</a>
  </div>
</div>

<script>
  // Confetti animation
  const colors = ["#1a3a6b","#c8a84b","#1db954","#e53935","#8b5cf6","#f59e0b"];
  const wrap = document.getElementById("confetti");
  for (let i = 0; i < 80; i++) {
    const el = document.createElement("div");
    el.className = "confetti-piece";
    el.style.cssText = `
      left: ${Math.random()*100}%;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
      width: ${6+Math.random()*8}px;
      height: ${6+Math.random()*8}px;
      border-radius: ${Math.random() > 0.5 ? "50%" : "2px"};
      animation-duration: ${2+Math.random()*3}s;
      animation-delay: ${Math.random()*2}s;
    `;
    wrap.appendChild(el);
  }
</script>
</body>
</html>
